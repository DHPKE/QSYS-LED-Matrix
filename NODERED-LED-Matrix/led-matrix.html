<script type="text/javascript">
    RED.nodes.registerType('led-matrix', {
        category: 'output',
        color: '#4a9eff',
        defaults: {
            name: { value: "" },
            ip: { value: "10.1.1.24", required: true },
            port: { value: 21324, required: true, validate: RED.validators.number() },
            segment: { value: "" },
            color: { value: "" },
            bgcolor: { value: "" },
            font: { value: "" },
            align: { value: "" },
            intensity: { value: "" },
            layout: { value: "" },
            brightness: { value: "" },
            frame: { value: "" },
            framecolor: { value: "" },
            framewidth: { value: "" },
            curtain: { value: "" },
            curtainColor: { value: "" },
            curtainEnable: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-th-large",
        label: function() {
            return this.name || `LED Matrix`;
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function() {
            const node = this;
            
            // Initialize color pickers from node values
            if (node.color) {
                $('#text-color-picker').val('#' + node.color.replace('#', ''));
            }
            if (node.bgcolor) {
                $('#text-bgcolor-picker').val('#' + node.bgcolor.replace('#', ''));
            }
            if (node.framecolor) {
                $('#frame-color-picker').val('#' + node.framecolor.replace('#', ''));
            }
            if (node.curtainColor) {
                $('#curtain-color-picker').val('#' + node.curtainColor.replace('#', ''));
            }
            
            // Color picker -> text input (user picks color)
            $('#text-color-picker').on('input', function() {
                $('#node-input-color').val($(this).val().substring(1).toUpperCase());
            });
            
            $('#text-bgcolor-picker').on('input', function() {
                $('#node-input-bgcolor').val($(this).val().substring(1).toUpperCase());
            });
            
            $('#frame-color-picker').on('input', function() {
                $('#node-input-framecolor').val($(this).val().substring(1).toUpperCase());
            });
            
            $('#curtain-color-picker').on('input', function() {
                $('#node-input-curtainColor').val($(this).val().substring(1).toUpperCase());
            });
            
            // Text input -> color picker (user types hex)
            $('#node-input-color').on('input', function() {
                const val = $(this).val().replace('#', '');
                if (val.length === 6 && /^[0-9A-Fa-f]{6}$/.test(val)) {
                    $('#text-color-picker').val('#' + val.toUpperCase());
                }
            });
            
            $('#node-input-bgcolor').on('input', function() {
                const val = $(this).val().replace('#', '');
                if (val.length === 6 && /^[0-9A-Fa-f]{6}$/.test(val)) {
                    $('#text-bgcolor-picker').val('#' + val.toUpperCase());
                }
            });
            
            $('#node-input-framecolor').on('input', function() {
                const val = $(this).val().replace('#', '');
                if (val.length === 6 && /^[0-9A-Fa-f]{6}$/.test(val)) {
                    $('#frame-color-picker').val('#' + val.toUpperCase());
                }
            });
            
            $('#node-input-curtainColor').on('input', function() {
                const val = $(this).val().replace('#', '');
                if (val.length === 6 && /^[0-9A-Fa-f]{6}$/.test(val)) {
                    $('#curtain-color-picker').val('#' + val.toUpperCase());
                }
            });
        }
    });
</script>

<script type="text/html" data-help-name="led-matrix">
    <p>Control LED Matrix display with simplified flat message structure.</p>
    
    <h3>Configuration</h3>
    <p>Set default values in node properties, or leave empty to use message values.</p>
    <ul>
        <li><strong>Segment:</strong> Default segment (0-3) or from message</li>
        <li><strong>Color:</strong> Default text color or from message</li>
        <li><strong>Background:</strong> Default background or from message</li>
        <li><strong>Font:</strong> Default font (arial/mono) or from message</li>
        <li><strong>Alignment:</strong> Default alignment (L/C/R) or from message</li>
        <li><strong>Intensity:</strong> Default intensity (0-255) or from message</li>
    </ul>

    <h3>Text Display</h3>
    <p>Send text to a segment:</p>
    <pre>msg.text = "Hello World";
msg.segment = 0;           // Optional if set in node
msg.color = "FF0000";      // Optional if set in node
msg.bgcolor = "000000";    // Optional if set in node</pre>
    
    <p>Or use payload:</p>
    <pre>msg.payload = "Hello";
msg.segment = 0;</pre>

    <h3>Layout</h3>
    <p>Change layout preset:</p>
    <pre>msg.layout = 7;  // Quad view</pre>
    
    <p>Presets: 1-7, 11-14</p>

    <h3>Brightness</h3>
    <p>Set display brightness:</p>
    <pre>msg.brightness = 128;  // 0-255</pre>

    <h3>Clear</h3>
    <p>Clear a segment:</p>
    <pre>msg.clear = 0;  // Clear segment 0</pre>
    
    <p>Clear all segments:</p>
    <pre>msg.clear = "all";  // or msg.clear = true</pre>

    <h3>Orientation</h3>
    <p>Set display orientation:</p>
    <pre>msg.orientation = 0;  // 0, 90, 180, 270</pre>

    <h3>Rotation</h3>
    <p>Rotate display (persists across reboots):</p>
    <pre>msg.rotation = 90;   // 0, 90, 180, 270 degrees
msg.group = 0;       // Optional group filter</pre>

    <h3>Test Mode</h3>
    <p>Enable/disable test mode (color bars + hostname/IP display):</p>
    <pre>msg.testmode = true;   // Enable test mode
msg.testmode = false;  // Disable test mode</pre>
    <p><strong>Note:</strong> Uses HTTP API (port 8080) instead of UDP.</p>

    <h3>Frame</h3>
    <p>Add border to a segment:</p>
    <pre>msg.frame = true;           // Enable frame
msg.segment = 0;            // Target segment
msg.framecolor = "FF0000";  // Optional color (default: white)
msg.framewidth = 2;         // Optional width (default: 1)</pre>
    
    <p>Disable frame:</p>
    <pre>msg.frame = false;
msg.segment = 0;</pre>

    <h3>Curtain Mode (v7.0.9 - 2px Frame)</h3>
    <p>Curtain Mode creates a 2-pixel frame around the entire display (all 4 edges: top, right, bottom, left).
       Each group (1-8) has independent curtain configuration. The frame overlays on top of segments.</p>
    
    <p>Show curtain for a group:</p>
    <pre>msg.curtainEnable = true;     // Show curtain frame
msg.curtainColor = "FF0000";  // Red frame (optional)
msg.group = 1;                // Group 1 (1-8 or 0 for all)</pre>
    
    <p>Hide curtain:</p>
    <pre>msg.curtainEnable = false;
msg.group = 1;</pre>
    
    <p><strong>Note:</strong> The curtain is a 2-pixel frame on all edges, overlaying segment content. 
       Use different colors for different groups to indicate status/zones.</p>

    <h3>Group</h3>
    <p>Define segment groups:</p>
    <pre>msg.group = 1;
msg.segments = [0, 1];  // Segments in group</pre>

    <h3>Config</h3>
    <p>Get configuration:</p>
    <pre>msg.config = {
    network: true,     // Include network info
    name: true,        // Include device name
    orientation: true  // Include orientation
};</pre>

    <h3>Message Properties</h3>
    <dl class="message-properties">
        <dt>text <span class="property-type">string</span></dt>
        <dd>Text to display (alternative: payload)</dd>
        
        <dt>layout <span class="property-type">number</span></dt>
        <dd>Layout preset (1-7, 11-14)</dd>
        
        <dt>brightness <span class="property-type">number</span></dt>
        <dd>Display brightness (0-255)</dd>
        
        <dt>clear <span class="property-type">number|string|boolean</span></dt>
        <dd>Clear segment (0-3) or "all"/true for entire display</dd>
        
        <dt>segment <span class="property-type">number</span></dt>
        <dd>Target segment (0-3) for text/clear</dd>
        
        <dt>color <span class="property-type">string</span></dt>
        <dd>Text color hex (FFFFFF)</dd>
        
        <dt>bgcolor <span class="property-type">string</span></dt>
        <dd>Background color hex (000000)</dd>
        
        <dt>font <span class="property-type">string</span></dt>
        <dd>Font: "arial" or "mono"</dd>
        
        <dt>align <span class="property-type">string</span></dt>
        <dd>Alignment: "L", "C", "R"</dd>
        
        <dt>intensity <span class="property-type">number</span></dt>
        <dd>Text intensity (0-255)</dd>
        
        <dt>orientation <span class="property-type">number</span></dt>
        <dd>Display orientation (0, 90, 180, 270)</dd>
        
        <dt>rotation <span class="property-type">number</span></dt>
        <dd>Rotate display (0, 90, 180, 270) - persists across reboots</dd>
        
        <dt>testmode <span class="property-type">boolean</span></dt>
        <dd>Enable/disable test mode (true/false)</dd>
        
        <dt>frame <span class="property-type">boolean</span></dt>
        <dd>Enable/disable segment border (true/false)</dd>
        
        <dt>framecolor <span class="property-type">string</span></dt>
        <dd>Frame color hex (FFFFFF)</dd>
        
        <dt>framewidth <span class="property-type">number</span></dt>
        <dd>Frame border width (1-3)</dd>
        
        <dt>group <span class="property-type">number</span></dt>
        <dd>Group number (0-8)</dd>
        
        <dt>segments <span class="property-type">array</span></dt>
        <dd>Segments in group [0,1,2,3]</dd>
        
        <dt>config <span class="property-type">object</span></dt>
        <dd>Config request options</dd>
    </dl>

    <h3>Priority</h3>
    <p><strong>Message values always override node configuration.</strong></p>
    <p>Node configuration provides defaults when message values are not present.</p>

    <h3>Examples</h3>
    <pre>// Simple text (uses node defaults)
msg.payload = "Hello";

// Override node settings
msg.text = "Temp: 22°C";
msg.segment = 2;
msg.color = "00FF00";

// Change layout
msg.layout = 7;

// Dim display
msg.brightness = 50;

// Clear segment 0
msg.clear = 0;

// Clear everything
msg.clear = "all";

// Rotate display 90 degrees
msg.rotation = 90;

// Enable test mode
msg.testmode = true;

// Add red frame to segment 0
msg.frame = true;
msg.segment = 0;
msg.framecolor = "FF0000";
msg.framewidth = 2;</pre>
</script>
